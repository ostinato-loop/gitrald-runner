name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Check for package.json
        id: check
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
            echo "No package.json found — scaffold repo, skipping CI steps"
          fi

      - name: Install dependencies
        if: steps.check.outputs.has_pkg == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        if: steps.check.outputs.has_pkg == 'true'
        run: pnpm run typecheck 2>/dev/null || echo "No typecheck script"

      - name: Build
        if: steps.check.outputs.has_pkg == 'true'
        run: pnpm run build 2>/dev/null || echo "No build script"

      - name: Test
        if: steps.check.outputs.has_pkg == 'true'
        run: pnpm run test 2>/dev/null || echo "No test script"
